apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aqp

resources:
  - namespace.yaml
  - configmap.yaml
  - redis.yaml
  - postgres.yaml
  - otel-collector.yaml
  - jaeger.yaml
  - api.yaml
  - worker.yaml
  - paper-trader.yaml
  # Streaming platform (IB Gateway + IBKR + Alpaca ingesters -> Kafka).
  - ibgateway.yaml
  - ingester-ibkr.yaml
  - ingester-alpaca.yaml
  # Model-serving (MLflow Serve / Ray Serve / TorchServe + Prometheus).
  - serving
  # Phase 5 — Celery beat scheduler + RBAC for the FinOps audit task.
  - beat-deployment.yaml

# Phase 5 (FinOps Governance). The four mandatory tags below are stamped
# on every resource so the Kyverno require-finops-tags ClusterPolicy in
# rpi_kubernetes/kubernetes/policies/finops/ never rejects an AQP
# workload at admission time. Source of truth: Settings.finops_labels()
# in aqp/config.py — keep these values in sync with .env.example.
commonLabels:
  app.kubernetes.io/part-of: agentic-quant-platform
  project: aqp-default
  cost_center: quant-research-01
  owner: system-orchestrator
  data_classification: proprietary-alpha

images:
  - name: aqp
    newName: aqp
    newTag: latest
  - name: aqp-paper
    newName: aqp-paper
    newTag: latest
  - name: aqp-ingester
    newName: aqp-ingester
    newTag: latest
  - name: aqp-serving
    newName: aqp-serving
    newTag: latest
