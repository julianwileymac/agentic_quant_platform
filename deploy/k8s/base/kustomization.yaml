apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aqp

resources:
  - namespace.yaml
  - configmap.yaml
  - redis.yaml
  - postgres.yaml
  - otel-collector.yaml
  - jaeger.yaml
  - api.yaml
  - worker.yaml
  - paper-trader.yaml
  # Streaming platform (IB Gateway + IBKR + Alpaca ingesters -> Kafka).
  - ibgateway.yaml
  - ingester-ibkr.yaml
  - ingester-alpaca.yaml
  # Model-serving (MLflow Serve / Ray Serve / TorchServe + Prometheus).
  - serving

commonLabels:
  app.kubernetes.io/part-of: agentic-quant-platform

images:
  - name: aqp
    newName: aqp
    newTag: latest
  - name: aqp-paper
    newName: aqp-paper
    newTag: latest
  - name: aqp-ingester
    newName: aqp-ingester
    newTag: latest
  - name: aqp-serving
    newName: aqp-serving
    newTag: latest
