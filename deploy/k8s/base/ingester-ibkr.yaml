# =============================================================================
# AQP IBKR Streaming Ingester
# =============================================================================
# Long-lived aqp-stream-ingest --venue ibkr pod. One replica only;
# IBKR TWS/Gateway accepts a single client per id pair.
#
# Mirrors the Alpaca ingester manifest at ingester-alpaca.yaml. Default
# replicas=0 so a fresh cluster does NOT try to dial IBKR until a user
# enables it from /streaming/producers in the AQP UI.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aqp-ingester-ibkr
  labels:
    app.kubernetes.io/name: aqp-ingester-ibkr
    app.kubernetes.io/component: streaming-ingester
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: aqp-ingester-ibkr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aqp-ingester-ibkr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9300"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ingester
          image: aqp-ingester:latest
          imagePullPolicy: IfNotPresent
          args: ["aqp-stream-ingest", "--venue", "ibkr"]
          envFrom:
            - configMapRef:
                name: aqp-env
            - secretRef:
                name: aqp-broker-secrets
          env:
            - name: AQP_IBKR_HOST
              value: "ibgateway.data-services.svc.cluster.local"
            - name: AQP_IBKR_PORT
              value: "4002"
          ports:
            - name: metrics
              containerPort: 9300
            - name: health
              containerPort: 9301
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9301
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9301
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aqp-ingester-ibkr
  labels:
    app.kubernetes.io/name: aqp-ingester-ibkr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aqp-ingester-ibkr
  ports:
    - name: metrics
      port: 9300
      targetPort: 9300
    - name: health
      port: 9301
      targetPort: 9301
