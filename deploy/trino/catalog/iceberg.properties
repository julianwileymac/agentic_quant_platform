connector.name=iceberg

# AQP visualization profile: Trino reads the same Iceberg REST catalog that
# FastAPI/worker writes to when docker-compose.viz.yml is active. Apache
# Polaris is the shared REST catalog endpoint; the warehouse property is the
# Polaris catalog name, not the S3 path.
#
# Credentials use Trino's native ${ENV:NAME} substitution so this file can
# be committed to the repo without leaking secrets. The visualization
# compose overlay passes AQP_S3_* / AQP_ICEBERG_S3_WAREHOUSE through to
# the trino container; defaults still resolve via .env.
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://polaris:8181/api/catalog
iceberg.rest-catalog.warehouse=${ENV:POLARIS_CATALOG}
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CLIENT_ID}:${ENV:POLARIS_CLIENT_SECRET}
# Polaris Iceberg REST OAuth token endpoint (internal realm auth).
iceberg.rest-catalog.oauth2.server-uri=http://polaris:8181/api/catalog/v1/oauth/tokens
iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL

# MinIO-backed warehouse used by the local visualization profile.
fs.native-s3.enabled=true
s3.endpoint=${ENV:AQP_S3_ENDPOINT_URL}
s3.region=${ENV:AQP_S3_REGION}
s3.path-style-access=true
s3.aws-access-key=${ENV:AQP_S3_ACCESS_KEY}
s3.aws-secret-key=${ENV:AQP_S3_SECRET_KEY}
