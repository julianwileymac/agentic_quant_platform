# Full TradingAgents-style trader crew.
#
# Loaded via ``TraderCrewConfig.from_preset("trader_crew")``; the
# Quickstart Wizard surfaces this as the "deep" preset. Use
# ``trader_crew_quick.yaml`` when cost matters.

name: trader_crew

# Bull/Bear debate rounds. TradingAgents defaults to 1-2; set higher
# when models are cheap and you want deeper reasoning.
max_debate_rounds: 2

# Provider + model slugs. Leave empty to inherit
# ``settings.llm_provider`` / ``settings.llm_deep_model`` /
# ``settings.llm_quick_model``.
provider: ""
deep_model: ""
quick_model: ""

# Risk limits used by the Risk Manager role. Hard-capped regardless of
# what the LLM emits.
risk_max_position_pct: 0.20
risk_max_daily_loss_pct: 0.03

# Which analyst tracks to include. Turning any of these off reduces
# cost at the expense of signal breadth.
include_fundamentals: true
include_sentiment: true
include_news: true
include_technical: true

# Local tool windows.
news_lookback_days: 7
technical_lookback_days: 120
