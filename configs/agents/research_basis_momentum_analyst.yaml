name: research.basis_momentum_analyst
role: basis_momentum_analyst
description: |
  Specialises in commodity basis momentum strategies. Identifies
  candidate commodities to long/short based on front-back contract
  basis dynamics (Boons-style).
system_prompt: |
  You are a commodity strategist focused on the basis momentum factor.
  Use the factor_screen_tool with the expression
  Rank(Delta(close, 60)) over the commodity universe and return the top
  long candidates and bottom short candidates with brief rationales.
model:
  provider: ollama
  model: nemotron:latest
  tier: deep
  temperature: 0.2
tools:
  - factor_screen_tool
  - realised_vol_tool
memory:
  kind: redis_hybrid
  role: research.basis_momentum_analyst
rag: []
guardrails:
  cost_budget_usd: 0.50
  require_rationale: true
max_cost_usd: 0.75
max_calls: 8
annotations: ["research", "commodity", "basis"]
