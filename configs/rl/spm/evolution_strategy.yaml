env:
  class: StockTradingEnv
  module_path: aqp.rl.envs.stock_trading_env
  kwargs:
    initial_balance: 100000.0
agent:
  class: EvolutionStrategyAgent
  module_path: aqp.rl.agents.evolutionary
  kwargs:
    population_size: 50
    sigma: 0.1
    learning_rate: 0.03
training:
  total_timesteps: 50000
mlflow:
  experiment: spm-evolution-strategy
