env:
  class: StockTradingEnv
  module_path: aqp.rl.envs.stock_trading_env
  kwargs:
    initial_balance: 100000.0
    transaction_cost_pct: 0.001
agent:
  class: QLearningAgent
  module_path: aqp.rl.agents.q_family.q_learning
  kwargs:
    gamma: 0.99
    lr: 0.001
    hidden_size: 64
training:
  total_timesteps: 50000
  eval_freq: 5000
mlflow:
  experiment: spm-dqn
