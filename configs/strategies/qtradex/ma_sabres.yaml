strategy:
  class: FrameworkAlgorithm
  module_path: aqp.strategies.framework
  kwargs:
    universe_model:
      class: StaticUniverse
      module_path: aqp.strategies.universes
      kwargs:
        symbols: ["BTC.BINANCE", "ETH.BINANCE"]
    alpha_model:
      class: MASabresAlpha
      module_path: aqp.strategies.qtradex.alphas
      kwargs:
        windows: [5, 10, 20, 50, 100]
        threshold_ratio: 0.6
    portfolio_model:
      class: SignalWeightedPortfolio
      module_path: aqp.strategies.portfolio
      kwargs:
        max_positions: 5
    risk_model:
      class: BasicRiskModel
      module_path: aqp.strategies.risk_models
      kwargs:
        max_position_pct: 0.30
        max_drawdown_pct: 0.20
    execution_model:
      class: MarketOrderExecution
      module_path: aqp.strategies.execution
      kwargs: {}
backtest:
  class: EventDrivenBacktester
  module_path: aqp.backtest.engine
  kwargs:
    initial_cash: 100000.0
    commission_pct: 0.0010
    slippage_bps: 5
    start: "2023-01-01"
    end: "2024-12-31"
