name: "Parabolic SAR Trend"
description: >
  Parabolic-SAR-flip trend strategy. Ref: quant-trading-master/Parabolic SAR backtest.py.

strategy:
  class: FrameworkAlgorithm
  module_path: aqp.strategies.framework
  kwargs:
    universe_model:
      class: StaticUniverse
      module_path: aqp.strategies.universes
      kwargs: {symbols: [SPY, QQQ, IWM, DIA, EFA, EEM]}
    alpha_model:
      class: ParabolicSARAlpha
      module_path: aqp.strategies.parabolic_sar_alpha
      kwargs: {acceleration: 0.02, max_acceleration: 0.2, allow_short: true}
    portfolio_model:
      class: EqualWeightPortfolio
      module_path: aqp.strategies.portfolio
      kwargs: {max_positions: 6}
    risk_model:
      class: TrailingStopRisk
      module_path: aqp.strategies.trailing_stop
      kwargs: {trail_pct: 0.06}
    execution_model:
      class: MarketOrderExecution
      module_path: aqp.strategies.execution
      kwargs: {}

backtest:
  engine: event
  kwargs:
    initial_cash: 100000.0
    commission_pct: 0.0005
    slippage_bps: 2.0
    start: "2023-01-01"
    end: "2024-12-31"
