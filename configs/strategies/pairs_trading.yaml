name: "Pairs Trading"
description: >
  Cointegration-based pairs trade on the SPY/QQQ spread. Enters at
  |z|=2 and exits at |z|=0.5.

strategy:
  class: FrameworkAlgorithm
  module_path: aqp.strategies.framework
  kwargs:
    universe_model:
      class: StaticUniverse
      module_path: aqp.strategies.universes
      kwargs:
        symbols: [SPY, QQQ]
    alpha_model:
      class: PairsTradingAlphaModel
      module_path: aqp.strategies.pairs_alpha
      kwargs:
        symbol_a: SPY
        symbol_b: QQQ
        lookback: 60
        entry_z: 2.0
        exit_z: 0.5
    portfolio_model:
      class: SignalWeightedPortfolio
      module_path: aqp.strategies.portfolio
      kwargs: {max_positions: 2}
    risk_model:
      class: BasicRiskModel
      module_path: aqp.strategies.risk_models
      kwargs: {max_position_pct: 0.5, max_drawdown_pct: 0.2}
    execution_model:
      class: MarketOrderExecution
      module_path: aqp.strategies.execution
      kwargs: {}
    rebalance_every: 1

backtest:
  class: EventDrivenBacktester
  module_path: aqp.backtest.engine
  kwargs:
    initial_cash: 100000.0
    commission_pct: 0.0005
    slippage_bps: 2.0
    start: "2023-01-01"
    end: "2024-12-31"
