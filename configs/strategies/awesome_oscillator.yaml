name: "Awesome Oscillator"
description: >
  SMA5 vs SMA34 of median price with saucer refinement. Ported from
  quant-trading-master/Awesome Oscillator backtest.py.

strategy:
  class: FrameworkAlgorithm
  module_path: aqp.strategies.framework
  kwargs:
    universe_model:
      class: StaticUniverse
      module_path: aqp.strategies.universes
      kwargs:
        symbols: [SPY, QQQ, IWM, DIA]
    alpha_model:
      class: AwesomeOscillatorAlpha
      module_path: aqp.strategies.awesome_oscillator_alpha
      kwargs: {fast: 5, slow: 34, use_saucer: true, allow_short: true}
    portfolio_model:
      class: EqualWeightPortfolio
      module_path: aqp.strategies.portfolio
      kwargs: {max_positions: 4}
    risk_model:
      class: BasicRiskModel
      module_path: aqp.strategies.risk_models
      kwargs: {max_position_pct: 0.25, max_drawdown_pct: 0.20}
    execution_model:
      class: MarketOrderExecution
      module_path: aqp.strategies.execution
      kwargs: {}

backtest:
  engine: event
  kwargs:
    initial_cash: 100000.0
    commission_pct: 0.0005
    slippage_bps: 2.0
    start: "2023-01-01"
    end: "2024-12-31"
