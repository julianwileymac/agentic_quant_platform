name: "Alpha158 + DNN"
description: >
  Qlib contrib model port — Alpha158 features + dense feed-forward
  network. Mirrors `qlib/contrib/model/pytorch_nn.py`.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN, META, NVDA]
        start_time: "2018-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2018-01-01", "2021-12-31"]
      valid: ["2022-01-01", "2022-12-31"]
      test:  ["2023-01-01", "2024-12-31"]

model:
  class: DNNModel
  module_path: aqp.ml.models.torch.dnn
  kwargs:
    layers: [256, 128, 32]
    dropout: 0.3
    activation: gelu
    lr: 0.001
    batch_size: 256
    n_epochs: 30

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5, 10]}}
