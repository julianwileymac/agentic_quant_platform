name: "Alpha158 + General PT NN"
description: >
  Qlib contrib model port — generic PyTorch network wrapper.
  Mirrors `qlib/contrib/model/pytorch_general_nn.py`.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN]
        start_time: "2019-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2019-01-01", "2022-12-31"]
      valid: ["2023-01-01", "2023-12-31"]
      test:  ["2024-01-01", "2024-12-31"]

model:
  class: GeneralPTNN
  module_path: aqp.ml.models.torch.general_nn
  kwargs:
    hidden_layers: [128, 64]
    dropout: 0.2
    lr: 0.001
    batch_size: 256
    n_epochs: 25

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
