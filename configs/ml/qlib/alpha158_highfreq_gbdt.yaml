name: "Alpha158 + High-Frequency GBDT"
description: >
  Intraday LightGBM variant — increased min_child_samples and conservative
  learning rate for minute-bar panels. Mirrors
  `qlib/contrib/model/highfreq_gdbt_model.py`. Use with a 1m or 5m
  Alpha158 panel.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, QQQ, AAPL, MSFT, NVDA]
        start_time: "2024-01-01"
        end_time: "2024-12-31"
        freq: "5m"
    segments:
      train: ["2024-01-01", "2024-09-30"]
      valid: ["2024-10-01", "2024-10-31"]
      test:  ["2024-11-01", "2024-12-31"]

model:
  class: HighFreqGBDT
  module_path: aqp.ml.models.highfreq_gbdt
  kwargs:
    num_leaves: 63
    learning_rate: 0.03
    n_estimators: 1500
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 200

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 3, 12]}}
