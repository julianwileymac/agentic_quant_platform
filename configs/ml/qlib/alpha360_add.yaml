name: "Alpha360 + ADD"
description: >
  Alpha360 + Adversarial Domain Adaptation. Mirrors
  `qlib/contrib/model/pytorch_add.py`.

dataset:
  class: TSDatasetH
  module_path: aqp.ml.dataset
  kwargs:
    step_len: 20
    handler:
      class: Alpha360
      module_path: aqp.ml.features.alpha360
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN]
        start_time: "2019-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2019-01-01", "2022-12-31"]
      valid: ["2023-01-01", "2023-12-31"]
      test:  ["2024-01-01", "2024-12-31"]

model:
  class: ADDModel
  module_path: aqp.ml.models.torch.add
  kwargs:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    step_len: 20
    n_domains: 4
    adv_lambda: 0.1
    lr: 0.001
    batch_size: 128
    n_epochs: 25

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
