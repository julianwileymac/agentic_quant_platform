name: "Alpha360 + Transformer (TS)"
description: >
  Alpha360 + encoder-only Transformer. Mirrors
  `qlib/contrib/model/pytorch_transformer_ts.py`.

dataset:
  class: TSDatasetH
  module_path: aqp.ml.dataset
  kwargs:
    step_len: 20
    handler:
      class: Alpha360
      module_path: aqp.ml.features.alpha360
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN]
        start_time: "2019-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2019-01-01", "2022-12-31"]
      valid: ["2023-01-01", "2023-12-31"]
      test:  ["2024-01-01", "2024-12-31"]

model:
  class: TransformerTSModel
  module_path: aqp.ml.models.torch.ts_aliases
  kwargs:
    d_model: 64
    n_heads: 4
    num_layers: 3
    dim_feedforward: 128
    dropout: 0.1
    step_len: 20
    lr: 0.0005
    batch_size: 128
    n_epochs: 25

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5]}}
