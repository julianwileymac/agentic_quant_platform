name: "Alpha360 + ALSTM"
description: >
  Alpha360 + attention-augmented LSTM. Mirrors
  `qlib/contrib/model/pytorch_alstm_ts.py`.

dataset:
  class: TSDatasetH
  module_path: aqp.ml.dataset
  kwargs:
    step_len: 20
    handler:
      class: Alpha360
      module_path: aqp.ml.features.alpha360
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN]
        start_time: "2019-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2019-01-01", "2022-12-31"]
      valid: ["2023-01-01", "2023-12-31"]
      test:  ["2024-01-01", "2024-12-31"]

model:
  class: ALSTMTSModel
  module_path: aqp.ml.models.torch.ts_aliases
  kwargs:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    attention_heads: 4
    step_len: 20
    lr: 0.001
    batch_size: 128
    n_epochs: 20

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5]}}
