name: "Alpha158 + Double Ensemble"
description: >
  Qlib contrib model port — Alpha158 features + DEnsemble (LightGBM stacked
  with sample reweighting). Mirrors `qlib/contrib/model/double_ensemble.py`.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN, META, NVDA, JPM, JNJ]
        start_time: "2018-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2018-01-01", "2021-12-31"]
      valid: ["2022-01-01", "2022-12-31"]
      test:  ["2023-01-01", "2024-12-31"]

model:
  class: DEnsembleModel
  module_path: aqp.ml.models.ensemble
  kwargs:
    base_class: LGBModel
    n_models: 6
    sample_ratio: 0.85
    feature_ratio: 0.7

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5, 10]}}
