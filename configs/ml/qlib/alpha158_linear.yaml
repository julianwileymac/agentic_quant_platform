name: "Alpha158 + Linear"
description: >
  Qlib contrib model port — Alpha158 features + linear regressor (Ridge).
  Mirrors `qlib/contrib/model/linear.py`.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN, META, NVDA]
        start_time: "2018-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2018-01-01", "2021-12-31"]
      valid: ["2022-01-01", "2022-12-31"]
      test:  ["2023-01-01", "2024-12-31"]

model:
  class: LinearModel
  module_path: aqp.ml.models.linear
  kwargs:
    estimator: ridge
    alpha: 1.0

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5, 10]}}
