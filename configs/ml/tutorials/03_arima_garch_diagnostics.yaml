name: "Tutorial 03 — ARIMA + GARCH diagnostics"
description: >
  Demonstrates the diagnostic-flow surface: ADF unit-root, ACF/PACF,
  ARIMA forecast, then GARCH(1,1) volatility on the residuals.
  Each block can be run from the Workbench drawer in sequence.

flows:
  - flow: unit_root
    payload:
      column: close
      test: all
  - flow: acf_pacf
    payload:
      column: close
      nlags: 30
  - flow: forecast
    payload:
      backend: arima
      horizon: 20
      forecaster_kwargs:
        order: [1, 1, 1]
  - flow: garch
    payload:
      column: close
      p: 1
      q: 1
      horizon: 10

dataset_cfg:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: ["SPY"]
        start_time: "2020-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2020-01-01", "2024-12-31"]
