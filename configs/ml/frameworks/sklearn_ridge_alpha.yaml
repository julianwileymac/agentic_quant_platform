name: sklearn_ridge_alpha
description: Lightweight sklearn Ridge alpha experiment on Alpha158 features.
dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY.NASDAQ, AAPL.NASDAQ, MSFT.NASDAQ]
        start_time: "2019-01-01"
        end_time: "2024-12-31"
        fit_start_time: "2019-01-01"
        fit_end_time: "2022-12-31"
    segments:
      train: ["2019-01-01", "2022-12-31"]
      valid: ["2023-01-01", "2023-12-31"]
      test: ["2024-01-01", "2024-12-31"]
model:
  class: SklearnRegressorModel
  module_path: aqp.ml.models.sklearn
  kwargs:
    estimator: ridge
    estimator_kwargs:
      alpha: 1.0
records:
  - class: SigAnaRecord
    module_path: aqp.ml.recorder
    kwargs: {}
