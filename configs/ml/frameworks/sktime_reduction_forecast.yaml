name: sktime_reduction_forecast
description: sktime reduction forecaster backed by a sklearn Ridge regressor.
dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY.NASDAQ]
        start_time: "2019-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2019-01-01", "2022-12-31"]
      test: ["2023-01-01", "2024-12-31"]
model:
  class: SktimeReductionForecastModel
  module_path: aqp.ml.models.forecasting
  kwargs:
    window_length: 20
    strategy: recursive
    horizon: 252
