name: keras_mlp_alpha
description: Keras dense regressor for tabular Alpha158 features.
dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY.NASDAQ, AAPL.NASDAQ, MSFT.NASDAQ]
        start_time: "2019-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2019-01-01", "2022-12-31"]
      valid: ["2023-01-01", "2023-12-31"]
      test: ["2024-01-01", "2024-12-31"]
model:
  class: KerasMLPModel
  module_path: aqp.ml.models.keras
  kwargs:
    hidden_layers: [128, 64]
    dropout: 0.1
    epochs: 10
    batch_size: 128
