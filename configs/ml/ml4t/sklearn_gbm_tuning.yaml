name: "ML4T Ch12 — Sklearn GBM Tuning"
description: >
  Reference recipe for hyperparameter tuning per ML4T Ch12 notebooks 02
  and 03. The actual sweep is driven by the optimizer (or `scripts.py`
  in the ML4T repo). Here we expose a "good baseline" config to start.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN, META, NVDA]
        start_time: "2010-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2010-01-01", "2018-12-31"]
      valid: ["2019-01-01", "2020-12-31"]
      test:  ["2021-01-01", "2024-12-31"]

model:
  class: LGBModel
  module_path: aqp.ml.models.tree
  kwargs:
    num_leaves: 63
    max_depth: 10
    learning_rate: 0.03
    n_estimators: 1500
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5, 10, 21]}}
