name: "ML4T Ch12 — CatBoost Trading Signals"
description: >
  CatBoost variant of `lightgbm_signals.yaml` for the comparative tables
  in ML4T Ch12 notebooks 05–07.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN, META, NVDA, JPM, JNJ, V, MA, HD, COST]
        start_time: "2010-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2010-01-01", "2019-12-31"]
      valid: ["2020-01-01", "2021-12-31"]
      test:  ["2022-01-01", "2024-12-31"]

model:
  class: CatBoostModel
  module_path: aqp.ml.models.tree
  kwargs:
    iterations: 2000
    depth: 8
    learning_rate: 0.03
    loss_function: RMSE
    l2_leaf_reg: 3.0

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5, 10, 21]}}
