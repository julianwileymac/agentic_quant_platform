name: "ML4T Ch12 — LightGBM Trading Signals"
description: >
  Mirrors notebook 05 — LightGBM trained for forward-return prediction
  with hyperparameters chosen from the Ch12 results table.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN, META, NVDA, JPM, JNJ, V, MA, HD, COST]
        start_time: "2010-01-01"
        end_time: "2024-12-31"
    segments:
      train: ["2010-01-01", "2019-12-31"]
      valid: ["2020-01-01", "2021-12-31"]
      test:  ["2022-01-01", "2024-12-31"]

model:
  class: LGBModel
  module_path: aqp.ml.models.tree
  kwargs:
    num_leaves: 127
    max_depth: -1
    learning_rate: 0.02
    n_estimators: 2000
    min_child_samples: 40
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 0.1
    reg_lambda: 1.0

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5, 10, 21]}}
  - {class: PortAnaRecord, module_path: aqp.ml.recorder, kwargs: {topk: 10}}
