name: "Alpha158 + LightGBM"
description: >
  Canonical qlib workflow — Alpha158 features + LightGBM regressor with
  train/valid/test segments.

dataset:
  class: DatasetH
  module_path: aqp.ml.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: aqp.ml.features.alpha158
      kwargs:
        instruments: [SPY, AAPL, MSFT, GOOGL, AMZN, META, NVDA, JPM, JNJ]
        start_time: "2018-01-01"
        end_time: "2024-12-31"
        fit_start_time: "2018-01-01"
        fit_end_time: "2021-12-31"
    segments:
      train: ["2018-01-01", "2021-12-31"]
      valid: ["2022-01-01", "2022-12-31"]
      test:  ["2023-01-01", "2024-12-31"]

model:
  class: LGBModel
  module_path: aqp.ml.models.tree
  kwargs:
    num_leaves: 63
    learning_rate: 0.05
    n_estimators: 500
    subsample: 0.8
    colsample_bytree: 0.8

records:
  - {class: SignalRecord, module_path: aqp.ml.recorder, kwargs: {}}
  - {class: SigAnaRecord, module_path: aqp.ml.recorder, kwargs: {horizons: [1, 5, 10]}}
  - {class: PortAnaRecord, module_path: aqp.ml.recorder, kwargs: {topk: 20}}
