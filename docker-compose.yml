# Ollama is intentionally NOT containerised — it runs natively on the host so
# it can access the GPU (macOS/Windows GPU passthrough into Docker is fragile).
# The api + worker containers reach it via host.docker.internal:11434.

services:
  redis:
    image: redis:7-alpine
    container_name: aqp-redis
    command: redis-server --appendonly yes --notify-keyspace-events KEA
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: aqp-postgres
    environment:
      POSTGRES_USER: aqp
      POSTGRES_PASSWORD: aqp
      POSTGRES_DB: aqp
    # Shifted to 5433 so AQP coexists with other local Postgres instances.
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aqp -d aqp"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: aqp-neo4j
    environment:
      NEO4J_AUTH: "${AQP_NEO4J_USER:-neo4j}/${AQP_NEO4J_PASSWORD:-aqpneo4j}"
      AQP_NEO4J_USER: "${AQP_NEO4J_USER:-neo4j}"
      AQP_NEO4J_PASSWORD: "${AQP_NEO4J_PASSWORD:-aqpneo4j}"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u \"$${AQP_NEO4J_USER}\" -p \"$${AQP_NEO4J_PASSWORD}\" 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: aqp-mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/artifacts/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      bash -lc "mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/artifacts/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts

  # -----------------------------------------------------------------------
  # MinIO — S3-compatible object store. **Disabled by default** now that
  # the Iceberg catalog runs in PyIceberg SQL mode against the
  # bind-mounted host warehouse at D:/aqp-warehouse → /warehouse. Bring
  # MinIO back with the ``legacy`` profile when you specifically need an
  # S3 endpoint:
  #   docker compose --profile legacy up -d minio minio-init iceberg-rest
  # -----------------------------------------------------------------------
  minio:
    profiles: ["legacy"]
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: aqp-minio
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: "${AQP_S3_ACCESS_KEY:-aqpminio}"
      MINIO_ROOT_PASSWORD: "${AQP_S3_SECRET_KEY:-aqpminiosecret}"
    ports:
      - "9000:9000"
      - "9091:9090"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio-init:
    profiles: ["legacy"]
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: aqp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${AQP_S3_ACCESS_KEY:-aqpminio} ${AQP_S3_SECRET_KEY:-aqpminiosecret} &&
        mc mb -p local/aqp-iceberg || true &&
        mc mb -p local/aqp-artifacts || true &&
        mc mb -p local/aqp-datasets || true &&
        echo 'MinIO buckets ready'
      "

  # -----------------------------------------------------------------------
  # Iceberg REST catalog — also moved to the ``legacy`` profile. Default
  # AQP now uses PyIceberg's SQL catalog rooted at /warehouse (host bind
  # mount), so this service is opt-in only. The REST catalog still has
  # value for cross-engine consumers (Spark/Trino/Flink) — bring it up
  # with ``docker compose --profile legacy up -d iceberg-rest`` and set
  # ``AQP_ICEBERG_REST_URI=http://iceberg-rest:8181`` to switch.
  # -----------------------------------------------------------------------
  iceberg-rest:
    profiles: ["legacy"]
    image: tabulario/iceberg-rest:1.6.0
    container_name: aqp-iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: "${AQP_S3_ACCESS_KEY:-aqpminio}"
      AWS_SECRET_ACCESS_KEY: "${AQP_S3_SECRET_KEY:-aqpminiosecret}"
      AWS_REGION: "${AQP_S3_REGION:-us-east-1}"
      CATALOG_WAREHOUSE: "s3://aqp-iceberg/"
      CATALOG_IO__IMPL: "org.apache.iceberg.aws.s3.S3FileIO"
      CATALOG_S3_ENDPOINT: "http://minio:9000"
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"
    healthcheck:
      # tabulario/iceberg-rest is based on a JRE image without curl/wget,
      # so probe the listening port via bash's /dev/tcp builtin instead.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8181' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  chromadb:
    # Image bumped to the 1.x line to match the chromadb python client
    # (>=1.0) shipped via pyproject.toml. The 0.4.x image speaks v1 API
    # while the new client expects v2 → 404 on /api/v2/auth/identity.
    image: chromadb/chroma:1.0.16
    container_name: aqp-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-api
    command: uvicorn aqp.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_POSTGRES_ASYNC_DSN: postgresql+asyncpg://aqp:aqp@postgres:5432/aqp
      AQP_GRAPH_STORE: "${AQP_GRAPH_STORE:-neo4j}"
      AQP_NEO4J_URI: bolt://neo4j:7687
      AQP_NEO4J_USER: "${AQP_NEO4J_USER:-neo4j}"
      AQP_NEO4J_PASSWORD: "${AQP_NEO4J_PASSWORD:-aqpneo4j}"
      AQP_NEO4J_DATABASE: "${AQP_NEO4J_DATABASE:-neo4j}"
      AQP_CHROMA_HOST: chromadb
      AQP_CHROMA_PORT: "8000"
      AQP_MLFLOW_TRACKING_URI: http://mlflow:5000
      AQP_OLLAMA_HOST: http://host.docker.internal:11434
      AQP_VLLM_BASE_URL: ${AQP_VLLM_BASE_URL:-}
      AQP_VLLM_API_KEY: ${AQP_VLLM_API_KEY:-}
      AQP_OTEL_ENDPOINT: http://otel-collector:4317
      # Iceberg catalog — PyIceberg SQL mode rooted at the bind-mounted
      # host warehouse (D:/aqp-warehouse on Windows, see volumes below).
      # REST + MinIO are intentionally cleared so the SQL fallback is taken.
      AQP_ICEBERG_REST_URI: ""
      AQP_ICEBERG_S3_WAREHOUSE: ""
      AQP_ICEBERG_WAREHOUSE: /warehouse/iceberg
      AQP_ICEBERG_STAGING_DIR: /warehouse/staging
      AQP_ICEBERG_NAMESPACE_DEFAULT: aqp
      AQP_S3_ENDPOINT_URL: ""
      AQP_S3_ACCESS_KEY: ""
      AQP_S3_SECRET_KEY: ""
      AQP_S3_REGION: "${AQP_S3_REGION:-us-east-1}"
      # Next.js webui (:3000) calls the API from the browser; whitelist enables credentialed CORS if needed.
      AQP_WEBUI_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      # Writable HOME / data dirs — CrewAI's RAG module eagerly wants a
      # writable ``platformdirs.user_data_dir`` on first class import.
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - "C:/Users/Julian Wiley/Downloads:/host-downloads:ro"
      # Persistent Iceberg warehouse + staging on the host drive. Tear
      # down the entire stack and the catalog still survives here.
      # NOTE: original target was D:/aqp-warehouse; moved to C: because
      # D: was not present on this host at apply-time.
      - "C:/aqp-warehouse:/warehouse"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-worker
    command: celery -A aqp.tasks.celery_app worker --loglevel=info -Q default,backtest,agents,ingestion,paper --concurrency=4
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_POSTGRES_ASYNC_DSN: postgresql+asyncpg://aqp:aqp@postgres:5432/aqp
      AQP_GRAPH_STORE: "${AQP_GRAPH_STORE:-neo4j}"
      AQP_NEO4J_URI: bolt://neo4j:7687
      AQP_NEO4J_USER: "${AQP_NEO4J_USER:-neo4j}"
      AQP_NEO4J_PASSWORD: "${AQP_NEO4J_PASSWORD:-aqpneo4j}"
      AQP_NEO4J_DATABASE: "${AQP_NEO4J_DATABASE:-neo4j}"
      AQP_CHROMA_HOST: chromadb
      AQP_CHROMA_PORT: "8000"
      AQP_MLFLOW_TRACKING_URI: http://mlflow:5000
      AQP_OLLAMA_HOST: http://host.docker.internal:11434
      AQP_VLLM_BASE_URL: ${AQP_VLLM_BASE_URL:-}
      AQP_VLLM_API_KEY: ${AQP_VLLM_API_KEY:-}
      AQP_OTEL_ENDPOINT: http://otel-collector:4317
      AQP_ICEBERG_REST_URI: ""
      AQP_ICEBERG_S3_WAREHOUSE: ""
      AQP_ICEBERG_WAREHOUSE: /warehouse/iceberg
      AQP_ICEBERG_STAGING_DIR: /warehouse/staging
      AQP_ICEBERG_NAMESPACE_DEFAULT: aqp
      AQP_S3_ENDPOINT_URL: ""
      AQP_S3_ACCESS_KEY: ""
      AQP_S3_SECRET_KEY: ""
      AQP_S3_REGION: "${AQP_S3_REGION:-us-east-1}"
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    volumes:
      - .:/app
      - "C:/Users/Julian Wiley/Downloads:/host-downloads:ro"
      - "C:/aqp-warehouse:/warehouse"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-worker-gpu
    command: celery -A aqp.tasks.celery_app worker --loglevel=info -Q training --concurrency=1
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_CHROMA_HOST: chromadb
      AQP_CHROMA_PORT: "8000"
      AQP_MLFLOW_TRACKING_URI: http://mlflow:5000
      AQP_OLLAMA_HOST: http://host.docker.internal:11434
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment and configure for real GPU access:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-beat
    command: celery -A aqp.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  # Legacy Solara UI — kept under a `legacy` profile so the default
  # `docker compose up -d` no longer starts it. Bring it up explicitly with:
  #   docker compose --profile legacy up -d ui
  # Will be removed once the Next.js webui has been validated end-to-end.
  ui:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-ui
    command: solara run aqp.ui.app --host 0.0.0.0 --port 8765
    env_file: .env
    environment:
      AQP_API_URL: http://api:8000
    ports:
      - "8765:8765"
    volumes:
      - .:/app
    depends_on:
      - api

  # -----------------------------------------------------------------------
  # Next.js 15 webui (Phase 0 of the Solara → React migration). Runs on
  # :3000 alongside the legacy Solara UI on :8765 until feature parity is
  # reached. Drop this section's dependency on `ui` to deprecate Solara.
  # -----------------------------------------------------------------------
  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
        NEXT_PUBLIC_DASH_URL: http://localhost:8000/dash/
        NEXT_PUBLIC_MLFLOW_URL: http://localhost:5000
        NEXT_PUBLIC_JAEGER_URL: http://localhost:16686
        NEXT_PUBLIC_SUPERSET_URL: http://localhost:8088
    container_name: aqp-webui
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_DASH_URL: http://localhost:8000/dash/
      NEXT_PUBLIC_MLFLOW_URL: http://localhost:5000
      NEXT_PUBLIC_JAEGER_URL: http://localhost:16686
      NEXT_PUBLIC_SUPERSET_URL: http://localhost:8088
      AQP_API_URL: http://api:8000
      AQP_WS_URL: ws://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # -----------------------------------------------------------------------
  # Paper trading service. Runs the default reference config in dry-run
  # mode so the container starts even when broker credentials are absent.
  # Override ``command`` to switch to a real config.
  # -----------------------------------------------------------------------
  paper-trader:
    build:
      context: .
      dockerfile: Dockerfile
      target: paper
    container_name: aqp-paper-trader
    command: aqp paper run --config /app/configs/paper/alpaca_mean_rev.yaml --dry-run
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_OTEL_ENDPOINT: http://otel-collector:4317
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # vLLM — OpenAI-compatible inference server. Optional, GPU-only profile.
  # Bring it up with:
  #   docker compose --profile vllm up -d vllm
  # AQP talks to it through the ``vllm`` LLM provider entry pointed at
  # http://vllm:8000/v1 (set AQP_VLLM_BASE_URL in .env).
  # -----------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: aqp-vllm
    profiles: ["vllm"]
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGINGFACE_HUB_TOKEN:-}"
      MODEL_ID: "${VLLM_MODEL_ID:-nvidia/Nemotron-4-Mini-Instruct}"
      SERVED_NAME: "${VLLM_SERVED_NAME:-nemotron}"
    command: >
      --model ${VLLM_MODEL_ID:-nvidia/Nemotron-4-Mini-Instruct}
      --served-model-name ${VLLM_SERVED_NAME:-nemotron}
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.85
    ports:
      - "${VLLM_PORT:-8002}:8000"
    volumes:
      - ./data/llm-models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 60s

  # -----------------------------------------------------------------------
  # vllm-fingpt — separate vLLM instance with `--enable-lora` so a FinGPT
  # LoRA adapter can be served alongside (or instead of) the base model.
  # Bring it up with:
  #   docker compose --profile vllm-fingpt up -d vllm-fingpt
  # Set FINGPT_LORA_ID and FINGPT_LORA_PATH in `.env` to point at the
  # adapter weights you have downloaded.
  # -----------------------------------------------------------------------
  vllm-fingpt:
    image: vllm/vllm-openai:latest
    container_name: aqp-vllm-fingpt
    profiles: ["vllm-fingpt"]
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGINGFACE_HUB_TOKEN:-}"
      FINGPT_BASE_MODEL: "${FINGPT_BASE_MODEL:-meta-llama/Llama-2-7b-hf}"
      FINGPT_LORA_ID: "${FINGPT_LORA_ID:-fingpt-forecaster}"
      FINGPT_LORA_PATH: "${FINGPT_LORA_PATH:-FinGPT/fingpt-forecaster_dow30_llama2-7b_lora}"
    command: >
      --model ${FINGPT_BASE_MODEL:-meta-llama/Llama-2-7b-hf}
      --served-model-name ${FINGPT_BASE_MODEL:-meta-llama/Llama-2-7b-hf}
      --enable-lora
      --lora-modules ${FINGPT_LORA_ID:-fingpt-forecaster}=${FINGPT_LORA_PATH:-FinGPT/fingpt-forecaster_dow30_llama2-7b_lora}
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.85
    ports:
      - "${VLLM_FINGPT_PORT:-8003}:8000"
    volumes:
      - ./data/llm-models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 60s

  # -----------------------------------------------------------------------
  # OpenTelemetry Collector + Jaeger for distributed tracing.
  # -----------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: aqp-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: aqp-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # Jaeger gRPC (from OTel collector)

  # -----------------------------------------------------------------------
  # Streaming platform (Kafka + IB Gateway + AQP ingesters).
  # Only the ``streaming`` profile starts these; bring them up with:
  #   docker compose --profile streaming up -d
  # -----------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: aqp-kafka
    profiles: ["streaming"]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_NUM_PARTITIONS: "6"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: aqp-kafka-init
    profiles: ["streaming"]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      '
      set -e;
      KAFKA=/opt/kafka/bin;
      for t in market.trade.v1 market.quote.v1 market.bar.v1 market.snapshot.v1
               market.scanner.v1 market.imbalance.v1 market.status.v1
               market.correction.v1 market.deadletter.v1
               features.indicators.v1 features.normalized.v1 features.signals.v1; do
        $$KAFKA/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists
          --topic $$t --partitions 6 --replication-factor 1;
      done;
      $$KAFKA/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists
        --topic market.contract.v1 --partitions 1 --replication-factor 1
        --config cleanup.policy=compact;
      echo "Topics created:";
      $$KAFKA/kafka-topics.sh --bootstrap-server kafka:9092 --list
      '

  ibgateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: aqp-ibgateway
    profiles: ["streaming"]
    environment:
      TRADING_MODE: "paper"
      TWOFA_TIMEOUT_ACTION: "restart"
      BYPASS_WARNING: "yes"
      TIME_ZONE: "Etc/UTC"
      TWS_USERID: "${TWS_USERID:-}"
      TWS_PASSWORD: "${TWS_PASSWORD:-}"
    ports:
      - "4002:4002"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 4002"]
      interval: 15s
      timeout: 5s
      retries: 20

  ingester-ibkr:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingester
    container_name: aqp-ingester-ibkr
    profiles: ["streaming"]
    command: aqp-stream-ingest --venue ibkr
    env_file: .env
    environment:
      AQP_KAFKA_BOOTSTRAP: "kafka:9092"
      AQP_IBKR_HOST: "ibgateway"
      AQP_IBKR_PORT: "4002"
    ports:
      - "19300:9300"  # /metrics
      - "19301:9301"  # /healthz
    depends_on:
      kafka:
        condition: service_healthy
      ibgateway:
        condition: service_started

  ingester-alpaca:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingester
    container_name: aqp-ingester-alpaca
    profiles: ["streaming"]
    command: aqp-stream-ingest --venue alpaca
    env_file: .env
    environment:
      AQP_KAFKA_BOOTSTRAP: "kafka:9092"
    ports:
      - "19302:9300"
      - "19303:9301"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  redis-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  mlflow-artifacts:
  chroma-data:
  kafka-data:
  minio-data:
