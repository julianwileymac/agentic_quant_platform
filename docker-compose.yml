# Ollama is intentionally NOT containerised — it runs natively on the host so
# it can access the GPU (macOS/Windows GPU passthrough into Docker is fragile).
# The api + worker containers reach it via host.docker.internal:11434.

services:
  redis:
    image: redis:7-alpine
    container_name: aqp-redis
    command: redis-server --appendonly yes --notify-keyspace-events KEA
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: aqp-postgres
    environment:
      POSTGRES_USER: aqp
      POSTGRES_PASSWORD: aqp
      POSTGRES_DB: aqp
    # Shifted to 5433 so AQP coexists with other local Postgres instances.
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aqp -d aqp"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: aqp-mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/artifacts/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      bash -lc "mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/artifacts/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: aqp-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-api
    command: uvicorn aqp.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_POSTGRES_ASYNC_DSN: postgresql+asyncpg://aqp:aqp@postgres:5432/aqp
      AQP_CHROMA_HOST: chromadb
      AQP_MLFLOW_TRACKING_URI: http://mlflow:5000
      AQP_OLLAMA_HOST: http://host.docker.internal:11434
      AQP_OTEL_ENDPOINT: http://otel-collector:4317
      # Next.js webui (:3000) calls the API from the browser; whitelist enables credentialed CORS if needed.
      AQP_WEBUI_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      # Writable HOME / data dirs — CrewAI's RAG module eagerly wants a
      # writable ``platformdirs.user_data_dir`` on first class import.
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-worker
    command: celery -A aqp.tasks.celery_app worker --loglevel=info -Q default,backtest,agents,ingestion,paper --concurrency=4
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_POSTGRES_ASYNC_DSN: postgresql+asyncpg://aqp:aqp@postgres:5432/aqp
      AQP_CHROMA_HOST: chromadb
      AQP_MLFLOW_TRACKING_URI: http://mlflow:5000
      AQP_OLLAMA_HOST: http://host.docker.internal:11434
      AQP_OTEL_ENDPOINT: http://otel-collector:4317
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-worker-gpu
    command: celery -A aqp.tasks.celery_app worker --loglevel=info -Q training --concurrency=1
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_MLFLOW_TRACKING_URI: http://mlflow:5000
      AQP_OLLAMA_HOST: http://host.docker.internal:11434
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment and configure for real GPU access:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-beat
    command: celery -A aqp.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      HOME: /app
      CREWAI_STORAGE_DIR: /app/data/crewai
      XDG_DATA_HOME: /app/data/xdg
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  # Legacy Solara UI — kept under a `legacy` profile so the default
  # `docker compose up -d` no longer starts it. Bring it up explicitly with:
  #   docker compose --profile legacy up -d ui
  # Will be removed once the Next.js webui has been validated end-to-end.
  ui:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqp-ui
    command: solara run aqp.ui.app --host 0.0.0.0 --port 8765
    env_file: .env
    environment:
      AQP_API_URL: http://api:8000
    ports:
      - "8765:8765"
    volumes:
      - .:/app
    depends_on:
      - api

  # -----------------------------------------------------------------------
  # Next.js 15 webui (Phase 0 of the Solara → React migration). Runs on
  # :3000 alongside the legacy Solara UI on :8765 until feature parity is
  # reached. Drop this section's dependency on `ui` to deprecate Solara.
  # -----------------------------------------------------------------------
  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
        NEXT_PUBLIC_DASH_URL: http://localhost:8000/dash/
        NEXT_PUBLIC_MLFLOW_URL: http://localhost:5000
        NEXT_PUBLIC_JAEGER_URL: http://localhost:16686
    container_name: aqp-webui
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_DASH_URL: http://localhost:8000/dash/
      NEXT_PUBLIC_MLFLOW_URL: http://localhost:5000
      NEXT_PUBLIC_JAEGER_URL: http://localhost:16686
      AQP_API_URL: http://api:8000
      AQP_WS_URL: ws://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # -----------------------------------------------------------------------
  # Paper trading service. Runs the default reference config in dry-run
  # mode so the container starts even when broker credentials are absent.
  # Override ``command`` to switch to a real config.
  # -----------------------------------------------------------------------
  paper-trader:
    build:
      context: .
      dockerfile: Dockerfile
      target: paper
    container_name: aqp-paper-trader
    command: aqp paper run --config /app/configs/paper/alpaca_mean_rev.yaml --dry-run
    env_file: .env
    environment:
      AQP_REDIS_URL: redis://redis:6379/0
      AQP_REDIS_PUBSUB_URL: redis://redis:6379/1
      AQP_POSTGRES_DSN: postgresql+psycopg2://aqp:aqp@postgres:5432/aqp
      AQP_OTEL_ENDPOINT: http://otel-collector:4317
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # OpenTelemetry Collector + Jaeger for distributed tracing.
  # -----------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: aqp-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: aqp-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # Jaeger gRPC (from OTel collector)

  # -----------------------------------------------------------------------
  # Streaming platform (Kafka + IB Gateway + AQP ingesters).
  # Only the ``streaming`` profile starts these; bring them up with:
  #   docker compose --profile streaming up -d
  # -----------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: aqp-kafka
    profiles: ["streaming"]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_NUM_PARTITIONS: "6"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: aqp-kafka-init
    profiles: ["streaming"]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      '
      set -e;
      KAFKA=/opt/kafka/bin;
      for t in market.trade.v1 market.quote.v1 market.bar.v1 market.snapshot.v1
               market.scanner.v1 market.imbalance.v1 market.status.v1
               market.correction.v1 market.deadletter.v1
               features.indicators.v1 features.normalized.v1 features.signals.v1; do
        $$KAFKA/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists
          --topic $$t --partitions 6 --replication-factor 1;
      done;
      $$KAFKA/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists
        --topic market.contract.v1 --partitions 1 --replication-factor 1
        --config cleanup.policy=compact;
      echo "Topics created:";
      $$KAFKA/kafka-topics.sh --bootstrap-server kafka:9092 --list
      '

  ibgateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: aqp-ibgateway
    profiles: ["streaming"]
    environment:
      TRADING_MODE: "paper"
      TWOFA_TIMEOUT_ACTION: "restart"
      BYPASS_WARNING: "yes"
      TIME_ZONE: "Etc/UTC"
      TWS_USERID: "${TWS_USERID:-}"
      TWS_PASSWORD: "${TWS_PASSWORD:-}"
    ports:
      - "4002:4002"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 4002"]
      interval: 15s
      timeout: 5s
      retries: 20

  ingester-ibkr:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingester
    container_name: aqp-ingester-ibkr
    profiles: ["streaming"]
    command: aqp-stream-ingest --venue ibkr
    env_file: .env
    environment:
      AQP_KAFKA_BOOTSTRAP: "kafka:9092"
      AQP_IBKR_HOST: "ibgateway"
      AQP_IBKR_PORT: "4002"
    ports:
      - "19300:9300"  # /metrics
      - "19301:9301"  # /healthz
    depends_on:
      kafka:
        condition: service_healthy
      ibgateway:
        condition: service_started

  ingester-alpaca:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingester
    container_name: aqp-ingester-alpaca
    profiles: ["streaming"]
    command: aqp-stream-ingest --venue alpaca
    env_file: .env
    environment:
      AQP_KAFKA_BOOTSTRAP: "kafka:9092"
    ports:
      - "19302:9300"
      - "19303:9301"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  redis-data:
  postgres-data:
  mlflow-artifacts:
  chroma-data:
  kafka-data:
